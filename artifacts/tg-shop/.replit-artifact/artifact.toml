kind = "web"
previewPath = "/tg-shop/"
title = "VoidAccount Telegram Shop"
version = "1.0.0"
id = "artifacts/tg-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tg-shop/" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/tg-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tg-shop", "run", "build" ]
publicDir = "artifacts/tg-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3001"
BASE_PATH = "/tg-shop/"
